name: Train Model

on:
  push:
    paths:
      - train_model.py
      - preprocess.py

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: python train_model.py

      - name: Run Tests
        run: pytest
